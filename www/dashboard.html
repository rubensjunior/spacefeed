<body is="dmx-app" id="dashboard" class="gradiente">

    <div is="dmx-browser" id="navegacao"></div>
    <dmx-serverconnect id="usuario" url="http://localhost:8100/api/desktop/auth/identificar-usuario" site="sfapis" dmx-param:id="loginusuario.data.id"></dmx-serverconnect>
    <dmx-local-manager id="loginusuario"></dmx-local-manager>



    <div class="container-fluid bg-black py-1 ps-3">
        <div class="row align-items-center">
            <div class="col align-self-center ps-4">
                <p class="m-0 font-mini text-dark-emphasis text-start">Spacefeed - Beta Teste</p>
            </div>
            <div class="col align-self-center pe-3">
                <p class="text-end m-0 font-mini text-dark-emphasis">Version 1.0.0</p>
            </div>
        </div>
    </div>
    <div class="container-fluid bg-black border-bottom border-dark py-1">
        <div class="row align-items-center">
            <div class="col-3 align-self-center">
                <div class="nav w-100 align-items-center">

                    </div>

                        </div>
                    </div>


                </div>
            </div>
            <div class="col align-self-lg-center">
                <h6 class="text-white text-lg-center m-0 fw-bold">{{usuario.data.queryUsuario[0].nomeFantasia}}</h6>
            </div>
            <div class="col-3 align-self-lg-center text-lg-end">
                <img src="assets/duotune/general/gen036.svg" width="22" class="me-2" id="minimizarBtn" alt="Minimizar">
                <img src="assets/duotune/general/gen034.svg" width="22" id="fecharBtn" alt="Fechar">
            </div>
        </div>
    </div>
    <header class="container-fluid navbar-dark bg-black py-3">
        <div class="container-fluid">
            <div class="row">
                <div class="col">
                    <nav class="navbar navbar-expand-lg ">
                        <a class="navbar-brand ms-auto" href="index.html">
                            <img src="assets/images/spacefeed-white.png" height="32"></a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar1_collapse" aria-controls="navbar1_collapse" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse justify-content-end align-items-center" id="navbar1_collapse1">
                            <button id="btn11" class="btn ms-5 pe-0 text-light btn-black btn-txt-min-02" dmx-on:click="loginusuario.remove('id');navegacao.goto('index.html')">{{usuario.data.queryUsuario[0].nome}}<img src="assets/images/blank.png" class="img-fluid ms-2 rounded-2" width="40"></button>

                        </div>
                    </nav>
                </div>
            </div>
        </div>

    <div class="container-fluid h-100">


        <div class="row h-100 mt-3 m-0">

                    <div class="col bg-white rounded-3 p-4 mb-3 border-secondary new-shadow">
                        <div class="d-flex flex-column">
                            <button id="btn1" class="btn text-start btn-txt-02 mb-2 f-color" dmx-on:click="navegacao.goto('/',true)"><img src="assets/duotune/abstract/abs029.svg" class="me-2 icon" width="20">Dashboard</button>
                            <button id="btn2" class="btn text-start btn-txt-02 mb-2 f-color" dmx-on:click="navegacao.goto('/colaboradores',true)" dmx-show="usuario.data.queryUsuario[0].isAdmin==1"><img src="assets/duotune/abstract/abs022.svg" class="me-2 icon" width="20">Colaboradores</button>
                            <button id="btn3" class="btn text-start btn-txt-02 mb-2 f-color" data-bs-toggle="collapse" data-bs-target="#projetoscoll"><img src="assets/duotune/abstract/abs042.svg" class="me-2 icon" width="20">Projetos e tarefas</button>

                            <div class="collapse border-start ms-3" id="projetoscoll" is="dmx-bs5-collapse">
                                <button id="btn8" class="btn text-start btn-txt-02 ms-4 mb-1" dmx-on:click="navegacao.goto('/times',true);projetoscoll.hide()">Times</button>
                                <button id="btn9" class="btn text-start btn-txt-02 ms-4 mb-1" dmx-on:click="navegacao.goto('/projetos',true);projetoscoll.hide()">Projetos</button>
                                <button id="btn10" class="btn text-start btn-txt-02 ms-4 mb-1">Tarefas</button>
                            </div>
                            <button id="btn4" class="btn text-start btn-txt-02 mb-2 f-color"><img src="assets/duotune/abstract/abs023.svg" class="me-2 icon" width="20">Leads</button>
                            <button id="btn5" class="btn text-start btn-txt-02 mb-3 f-color"><img src="assets/duotune/abstract/abs020.svg" class="me-2 icon" width="20">Chamados</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-10 px-5 h-100 overflow-auto">
                <div is="dmx-view" id="view"></div>
            </div>
        </div>
