<!doctype html>
<html lang="pt-br">

<head>
    <script src="dmxAppConnect/dmxAppConnect.js"></script>
    <meta charset="UTF-8">
    <title>SGI - Spacefeed</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="bootstrap/5/css/bootstrap.min.css" />
    <script src="capacitor.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="dmxAppConnect/dmxRouting/dmxRouting.js" defer></script>
    <script src="js/routes.js" defer></script>
    <script src="dmxAppConnect/dmxStateManagement/dmxStateManagement.js" defer></script>
    <script src="dmxAppConnect/dmxBootstrap5Collapse/dmxBootstrap5Collapse.js" defer></script>
    <script src="dmxAppConnect/dmxBootstrap5Navigation/dmxBootstrap5Navigation.js" defer></script>
    <script src="dmxAppConnect/dmxBrowser/dmxBrowser.js" defer></script>
    <script src="dmxAppConnect/dmxBootstrap5Modal/dmxBootstrap5Modal.js" defer></script>
</head>

<body is="dmx-app" id="dashboard">
    <dmx-serverconnect id="logout" url="https://sun.spacefeed.app/api/usuarios/logout" site="web"></dmx-serverconnect>
    <div is="dmx-browser" id="navegacao"></div>
    <dmx-serverconnect id="dadosusuario" url="https://sun.spacefeed.app/api/usuarios/identificar-usuario" site="web" dmx-param:id="usuario.data.id"></dmx-serverconnect>
    <dmx-local-manager id="usuario"></dmx-local-manager>
    <div class="container-fluid vh-100">
        <div class="row h-100">
            <div class="col-12 col-md-3">
                <div class="row h-75 bg-black m-2 rounded-4">
                    <div class="col-3 py-4 border-end border-dark">
                        <img src="assets/images/appIcon.ico" class="img-fluid rounded-4">
                    </div>
                    <div class="col py-4">

                        <div class="nav w-100 flex-column">
                            <a class="nav-item nav-link nav-color" href="/" data-bs-toggle="collapse" internal="true">Dashboard</a>
                            <a class="nav-item nav-link nav-color" href="/colaboradores" data-bs-toggle="collapse" internal="true">Colaboradores</a>
                            <a class="nav-item nav-link nav-color" data-bs-toggle="collapse" data-bs-target="#collapse1">Projetos</a>
                            <div class="collapse" id="collapse1" is="dmx-bs5-collapse">
                                <a href="/times" class="nav-link nav-color  ms-2" internal="true">Times</a>
                                <a href="/projetos" class="nav-link nav-color  ms-2" internal="true">Projetos</a>
                                <a href="/tarefas" class="nav-link nav-color  ms-2" internal="true">Tarefas</a>
                            </div><a class="nav-item nav-link nav-color" href="/leads" internal="true">Leads</a>
                            <a class="nav-item nav-link nav-color" href="/chamados" internal="true">Chamados</a>
                            <a class="nav-item nav-link nav-color" href="/financeiro" internal="true">Financeiro</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-9 px-5 py-4">
                <div class="row">
                    <div class="col">
                        <div is="dmx-view" id="view1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="bootstrap/5/js/bootstrap.bundle.min.js"></script>
</body>

</html>
