<!doctype html>
<html lang="pt-br">

<head>
    <script src="dmxAppConnect/dmxAppConnect.js"></script>
    <meta charset="UTF-8">
    <title>Spacefeed - SGI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="bootstrap/5/css/bootstrap.min.css" />
    <script src="capacitor.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="dmxAppConnect/dmxBootstrap5Navigation/dmxBootstrap5Navigation.js" defer></script>
    <script src="js/routes.js" defer></script>
    <script src="dmxAppConnect/dmxBootstrap5Collapse/dmxBootstrap5Collapse.js" defer></script>
    <script src="dmxAppConnect/dmxRouting/dmxRouting.js" defer></script>
    <script src="dmxAppConnect/dmxStateManagement/dmxStateManagement.js" defer></script>
    <script src="dmxAppConnect/dmxBrowser/dmxBrowser.js" defer></script>
    <script src="dmxAppConnect/dmxBootstrap5Modal/dmxBootstrap5Modal.js" defer></script>
    <link rel="stylesheet" href="dmxAppConnect/dmxNotifications/dmxNotifications.css" />
    <script src="dmxAppConnect/dmxNotifications/dmxNotifications.js" defer></script>
    <script src="dmxAppConnect/dmxFormatter/dmxFormatter.js" defer></script>
    <link rel="stylesheet" href="dmxAppConnect/dmxBootstrap5TableGenerator/dmxBootstrap5TableGenerator.css" />
    <link rel="stylesheet" href="dmxAppConnect/dmxValidator/dmxValidator.css" />
    <script src="dmxAppConnect/dmxValidator/dmxValidator.js" defer></script>
    <script src="dmxAppConnect/dmxDataTraversal/dmxDataTraversal.js" defer></script>
    <script src="dmxAppConnect/dmxVideo/dmxVideo.js" defer></script>
    <link rel="stylesheet" href="dmxAppConnect/dmxAnimateCSS/animate.min.css" />
    <script src="dmxAppConnect/dmxAnimateCSS/dmxAnimateCSS.js" defer></script>
</head>

<body is="dmx-app" id="dashboard" class="gradiente">
    <div is="dmx-browser" id="navegacao"></div>
    <dmx-serverconnect id="usuario" url="http://localhost:8100/api/usuarios/identificar-usuario" site="web" dmx-param:id="loginusuario.data.id"></dmx-serverconnect>
    <dmx-local-manager id="loginusuario"></dmx-local-manager>


    <header class="container-fluid navbar-dark bg-black px-5 py-1 m-0">
        <div class="container-fluid">
            <div class="row">
                <div class="col">
                    <nav class="navbar navbar-expand-lg ">
                        <a class="navbar-brand ms-auto" href="index.html">
                            <img src="assets/images/spacefeed-white.png" height="32"></a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar1_collapse" aria-controls="navbar1_collapse" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse justify-content-end align-items-center" id="navbar1_collapse">
                            <div class="navbar-nav align-items-center justify-content-center">
                                <img src="assets/duotune/communication/com012.svg" class="me-3" width="22">
                            </div>
                            <button id="btn6" class="btn ms-5 text-light btn-black btn-txt-min-02" dmx-on:click="loginusuario.remove('id');navegacao.goto('index.html')">{{usuario.data.queryUsuario[0].nome}}<img src="assets/images/blank.png" class="img-fluid ms-2 rounded-2" width="40"></button>

                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <div class="container-fluid h-100">


        <div class="row h-100 mt-5 ps-4 m-0">
            <div class="col-12 col-md-2 h-100">
                <div class="row">
                    <div class="col bg-white rounded-3 p-4 mb-3 border-secondary new-shadow">
                        <div class="d-flex flex-column">
                            <button id="btn1" class="btn text-start btn-txt-02 mb-2 f-color" dmx-on:click="navegacao.goto('/',true)"><img src="assets/duotune/abstract/abs029.svg" class="me-2 icon" width="20">Dashboard</button>
                            <button id="btn2" class="btn text-start btn-txt-02 mb-2 f-color" dmx-on:click="navegacao.goto('/colaboradores',true)" dmx-show="usuario.data.queryUsuario[0].isAdmin==1"><img src="assets/duotune/abstract/abs022.svg" class="me-2 icon" width="20">Colaboradores</button>
                            <button id="btn3" class="btn text-start btn-txt-02 mb-2 f-color" data-bs-toggle="collapse" data-bs-target="#projetoscoll"><img src="assets/duotune/abstract/abs042.svg" class="me-2 icon" width="20">Projetos e tarefas</button>

                            <div class="collapse border-start ms-3" id="projetoscoll" is="dmx-bs5-collapse">
                                <button id="btn8" class="btn text-start btn-txt-02 ms-4 mb-1" dmx-on:click="navegacao.goto('/times',true);projetoscoll.hide()">Times</button>
                                <button id="btn9" class="btn text-start btn-txt-02 ms-4 mb-1" dmx-on:click="navegacao.goto('/projetos',true);projetoscoll.hide()">Projetos</button>
                                <button id="btn10" class="btn text-start btn-txt-02 ms-4 mb-1">Tarefas</button>
                            </div>
                            <button id="btn4" class="btn text-start btn-txt-02 mb-2 f-color"><img src="assets/duotune/abstract/abs023.svg" class="me-2 icon" width="20">Leads</button>
                            <button id="btn5" class="btn text-start btn-txt-02 mb-3 f-color"><img src="assets/duotune/abstract/abs020.svg" class="me-2 icon" width="20">Chamados</button><button id="btn7" class="btn btn-txt-02 btn-light py-2">Suporte Spacefeed</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-10 px-5 h-100 overflow-auto">
                <div is="dmx-view" id="view"></div>
            </div>
        </div>
    </div>
    <script src="bootstrap/5/js/bootstrap.bundle.min.js"></script>
</body>

</html>
