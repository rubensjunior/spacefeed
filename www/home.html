<!-- Wappler include head-page="index.html" is="dmx-app" id="home" appConnect="local" bootstrap5="local" capacitor="local" components="{dmxNotifications:{}}" -->
<dmx-notifications id="toast"></dmx-notifications>
<div class="container">
    <form id="login1" is="dmx-serverconnect-form" method="post" action="https://sun.spacefeed.app:8100/api/autenticacao/login" site="sun" credentials="true" dmx-on:unauthorized="toast.warning('Login ou senha errado.');login1.reset()" dmx-on:success="toast.success('Logado com sucesso!');login1.reset()" dmx-on:error="toast.danger(lastError.status+lastError.message+lastError.response);login1.reset()">
        <div class="row">
            <div class="col-12 col-md-8 col-lg-7 col-xl-5 text-start">
                <div class="row">
                    <div class="col">
                        <h1>Log In</h1>
                        <p class="text-h3">Enter your details below.</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col mt-4">
                        <input type="text" id="email" name="email" class="form-control" placeholder="Email">
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Password">
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col">
                        <button id="login1_submit" class="btn" type="submit">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
