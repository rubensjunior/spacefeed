<!-- Wappler include head-page="dashboard.html" is="dmx-app" id="colaboradores" appConnect="local" bootstrap5="local" capacitor="local" components="{dmxBootstrap5Modal:{},dmxNotifications:{},dmxFormatter:{},dmxBootstrap5TableGenerator:{},dmxValidator:{},dmxDataTraversal:{}}" -->
<dmx-data-detail id="editarColagorador" dmx-bind:data="listarColaboradores.data.queryListarColaboradores" key="id"></dmx-data-detail>
<dmx-serverconnect id="listarColaboradores" url="http://localhost:8100/api/desktop/colaboradores/listar-colaboradores" site="sfapis" dmx-param:empresa="usuario.data.queryUsuario[0].empresa"></dmx-serverconnect>
<dmx-notifications id="toasts"></dmx-notifications>
<div class="modal" id="criar" is="dmx-bs5-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title pe-3 fw-bold">Criar colaborador</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" dmx-on:click="criarColaborador.reset()"></button>
            </div>
            <div class="modal-body px-5 py-4">
                <form method="post" site="sfapis" id="criarColaborador" is="dmx-serverconnect-form" action="http://localhost:8100/api/desktop/colaboradores/cadastrar-colaborador" dmx-on:error="toasts.danger('Ocorreu um erro: '+lastError.status+lastError.message+lastError.response);criarColaborador.reset();criar.hide()" dmx-on:success="toasts.success('Colaborador cadsatrado com sucesso!');criarColaborador.reset();criar.hide();listarColaboradores.load({empresa: usuario.data.queryUsuario[0].empresa})">

                    <div class="form-group mb-3">
                        <input class="form-control" id="academicocheck" name="academicocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="academico1.value" type="hidden">
                        <input class="form-control" id="admincheck" name="admincheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="admin1.value" type="hidden">
                        <input class="form-control" id="atendimentocheck" name="atendimentocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="atendimento1.value" type="hidden">
                        <input class="form-control" id="comercialcheck" name="comercialcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="comercial1.value" type="hidden">
                        <input class="form-control" id="diretoriacheck" name="diretoriacheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="diretoria1.value" type="hidden">
                        <input class="form-control" id="financeirocheck" name="financeirocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="financeiro1.value" type="hidden">
                        <input class="form-control" id="mktcheck" name="mktcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="mkt1.value" type="hidden">
                        <input class="form-control" id="admcheck" name="admcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="admin.value" type="hidden">
                        <input class="form-control" id="ticheck" name="ticheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="ti1.value" type="hidden">
                        <input class="form-control" id="criadopor" name="criadopor" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="usuario.data.queryUsuario[0].id" type="hidden">
                    </div>
                    <div class="form-group mb-3">
                        <input type="text" class="form-control ipt-text-02" id="nomecolaborador" name="nomecolaborador" aria-describedby="input2_help" placeholder="Nome completo do colaborador" required="" data-msg-required="Campo obrigatório.">
                    </div>
                    <div class="form-group mb-3">
                        <input type="email" class="form-control ipt-text-02" id="emailcolaborador" name="emailcolaborador" aria-describedby="input2_help" placeholder="E-mail para login" required="" data-msg-required="Campo obrigatório." data-rule-email="" data-msg-email="Insira um e-mail válido.">
                        <input type="hidden" class="form-control ipt-text-02" id="empresa" name="empresa" aria-describedby="input2_help" dmx-bind:value="usuario.data.queryUsuario[0].empresa">
                        <input type="hidden" class="form-control ipt-text-02" id="id1" name="id1" aria-describedby="input2_help" placeholder="E-mail para login" dmx-bind:value="editarColagorador.data.id">
                    </div>
                    <div class="row mb-3 p-2 m-0 rounded-3 border-inner-form">
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="academico1" name="academico1" dmx-on:checked="academico1.setValue(1)" dmx-on:unchecked="academico1.setValue(0)" value="0">
                                <label class="form-check-label" for="academico1">Acadêmico</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="admin1" name="admin1" dmx-on:checked="admin1.setValue(1)" dmx-on:unchecked="admin1.setValue(0)" value="0">
                                <label class="form-check-label" for="diretoria1">Administrativo</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="atendimento1" name="atendimento1" dmx-on:checked="atendimento1.setValue(1)" dmx-on:unchecked="atendimento1.setValue(0)" value="0">
                                <label class="form-check-label" for="atendimento1">Atendimento<br></label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="comercial1" name="comercial1" dmx-on:checked="comercial1.setValue(1)" dmx-on:unchecked="comercial1.setValue(0)" value="0">
                                <label class="form-check-label" for="diretoria1">Comercial</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="diretoria1" name="diretoria1" dmx-on:checked="diretoria1.setValue(1)" dmx-on:unchecked="diretoria1.setValue(0)" value="0">
                                <label class="form-check-label" for="diretoria1">Diretoria</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="financeiro1" name="financeiro1" dmx-on:checked="financeiro1.setValue(1)" dmx-on:unchecked="financeiro1.setValue(0)" value="0">
                                <label class="form-check-label" for="financeiro1">Financeiro</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="mkt1" name="mkt1" dmx-on:checked="mkt1.setValue(1)" dmx-on:unchecked="mkt1.setValue(0)" value="0">
                                <label class="form-check-label" for="mkt1">Marketing</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ti1" name="ti1" dmx-on:checked="ti1.setValue(1)" dmx-on:unchecked="ti1.setValue(0)" value="0">
                                <label class="form-check-label" for="ti1">T.I</label>
                            </div>
                        </div>
                    </div>
                    <div class="row p-2 m-0 rounded-3 border-inner-form">
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="admin" name="admin" dmx-on:checked="admin.setValue(1)" dmx-on:unchecked="admin.setValue(0)" value="0">
                                <label class="form-check-label" for="admin2">Administrador</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" dmx-on:click="criarColaborador.reset()">Cancelar</button>
                <button type="submit" class="btn btn-primary" dmx-on:click="criarColaborador.submit()">Adicionar</button>
            </div>
        </div>
    </div>
</div>
<div class="modal" id="editarModal" is="dmx-bs5-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title pe-3"><b>Editar colaborador:</b> {{editarColagorador.data.nome}}</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" dmx-on:click="editarColagorador.select(0);editarestecolaborador.reset()"></button>
            </div>
            <div class="modal-body px-5 py-4">
                <form method="post" action="http://localhost:8100/api/desktop/colaboradores/atualizar-colaborador" site="sfapis" is="dmx-serverconnect-form" id="editarestecolaborador" dmx-on:success="editarestecolaborador.reset();editarModal.hide();toasts.success('Cadastrado com sucesso!');listarColaboradores.load({empresa: usuario.data.queryUsuario[0].empresa});editarColagorador.select(0)" dmx-on:error="editarestecolaborador.reset();editarColagorador.select();editarModal.hide();toasts.danger('Ocorreu um erro: '+lastError.status+lastError.message+lastError.response)">


                    <div class="form-group mb-3">
                        <input type="text" class="form-control ipt-text-02" id="editnomecolaborador" name="editnomecolaborador" aria-describedby="input2_help" placeholder="Nome completo do colaborador" dmx-bind:value="editarColagorador.data.nome" required="" data-msg-required="Campo obrigatório.">
                    </div>
                    <div class="form-group mb-3">
                        <input class="form-control" id="editacademicocheck" name="editacademicocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="academico.value" type="hidden">
                        <input class="form-control" id="editadministrativo" name="editadministrativo" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="adm.value" type="hidden">
                        <input class="form-control" id="editatendimentocheck" name="editatendimentocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="atendimento.value" type="hidden">
                        <input class="form-control" id="editcomercialcheck" name="editcomercialcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="comercial.value" type="hidden">
                        <input class="form-control" id="editdiretoriacheck" name="editdiretoriacheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="diretoria.value" type="hidden">
                        <input class="form-control" id="editfinanceirocheck" name="editfinanceirocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="financeiro.value" type="hidden">
                        <input class="form-control" id="editmktcheck" name="editmktcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="marketing.value" type="hidden">
                        <input class="form-control" id="editticheck" name="editticheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="ti.value" type="hidden">
                        <input class="form-control" id="editadmcheck" name="editadmcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="admin2.value" type="hidden">
                        <input class="form-control" id="editativocheck" name="editativocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="ativo1.value" type="hidden"><input class="form-control" id="id" name="id" aria-describedby="input2_help" dmx-bind:value="editarColagorador.data.id" type="hidden">
                    </div>
                    <div class="form-group mb-3">
                        <input type="email" class="form-control ipt-text-02" id="editemailcolaborador" name="editemailcolaborador" aria-describedby="input2_help" placeholder="E-mail para login" data-rule-email="" data-msg-email="Insira um e-mail válido." required="" data-msg-required="Campo obrigatório." dmx-bind:value="editarColagorador.data.email">

                    </div>
                    <div class="row mb-3 p-2 m-0 rounded-3 border-inner-form">
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="academico" name="academico" dmx-on:checked="academico.setValue(1)" dmx-on:unchecked="academico.setValue(0)" dmx-bind:value="editarColagorador.data.academico" dmx-bind:checked="editarColagorador.data.academico==1">
                                <label class="form-check-label" for="academico">Acadêmico</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="adm" name="adm" dmx-on:checked="adm.setValue(1)" dmx-on:unchecked="adm.setValue(0)" dmx-bind:value="editarColagorador.data.administrativo" dmx-bind:checked="editarColagorador.data.administrativo==1">
                                <label class="form-check-label" for="admcheck">Administrativo</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="atendimento" name="atendimento" dmx-on:checked="atendimento.setValue(1)" dmx-on:unchecked="atendimento.setValue(0)" dmx-bind:value="editarColagorador.data.atendimento" dmx-bind:checked="editarColagorador.data.atendimento==1">
                                <label class="form-check-label" for="atendimento">Atendimento<br></label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="comercial" name="comercial" dmx-on:checked="comercial.setValue(1)" dmx-on:unchecked="comercial.setValue(0)" dmx-bind:value="editarColagorador.data.comercial" dmx-bind:checked="editarColagorador.data.comercial==1">
                                <label class="form-check-label" for="comercial">Comercial</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="diretoria" name="diretoria" dmx-on:checked="diretoria.setValue(1)" dmx-on:unchecked="diretoria.setValue(0)" dmx-bind:value="editarColagorador.data.diretoria" dmx-bind:checked="editarColagorador.data.diretoria==1">
                                <label class="form-check-label" for="diretoria">Diretoria</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="financeiro" name="financeiro" dmx-on:checked="financeiro.setValue(1)" dmx-on:unchecked="financeiro.setValue(0)" dmx-bind:value="editarColagorador.data.financeiro" dmx-bind:checked="editarColagorador.data.financeiro==1">
                                <label class="form-check-label" for="financeiro">Financeiro</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="marketing" name="marketing" dmx-on:checked="marketing.setValue(1)" dmx-on:unchecked="marketing.setValue(0)" dmx-bind:value="editarColagorador.data.marketing" dmx-bind:checked="editarColagorador.data.marketing==1">
                                <label class="form-check-label" for="marketing">Marketing</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ti" name="ti" dmx-on:checked="ti.setValue(1)" dmx-on:unchecked="ti.setValue(0)" dmx-bind:value="editarColagorador.data.ti" dmx-bind:checked="editarColagorador.data.ti==1">
                                <label class="form-check-label" for="ti">T.I</label>
                            </div>
                        </div>
                    </div>
                    <div class="row p-2 m-0 rounded-3 border-inner-form">
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="admin2" name="admin2" dmx-on:checked="admin2.setValue(1)" dmx-on:unchecked="admin2.setValue(0)" value="0" dmx-bind:value="editarColagorador.data.isAdmin" dmx-bind:checked="editarColagorador.data.isAdmin==1">
                                <label class="form-check-label" for="admin2">Administrador</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ativo1" name="ativo1" dmx-on:checked="ativo1.setValue(1)" dmx-on:unchecked="ativo1.setValue(0)" value="0" dmx-bind:value="editarColagorador.data.isAtivo" dmx-bind:checked="editarColagorador.data.isAtivo==1">
                                <label class="form-check-label" for="ativo1">Ativo</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" dmx-on:click="editarestecolaborador.reset();editarColagorador.select(0)">Cancelar</button>
                <button type="submit" class="btn btn-primary" dmx-on:click="editarestecolaborador.submit()">Atualizar</button>
            </div>
        </div>
    </div>
</div>

<main>
    <div class="mb-4 d-flex flex-row justify-content-between align-items-start">
        <h4 class="p-0 m-0">Colaboradores<small class="text-body-secondary sub-title">Gestão de contas e acessos</small></h4>
        <button id="btn1" class="btn btn-txt btn-dark" data-bs-toggle="modal" data-bs-target="#criar">Criar novo</button>
    </div>
    <div class="container-fluid bg-white p-4 rounded-3 new-shadow">
        <div class="row">
            <div class="col">

                <div class="row pb-3 gx-2 align-items-center border-bottom mx-0">
                    <div class="col align-self-center p-0">
                        <h6 class="p-1 m-0 txt-tab-title">Nome</h6>
                    </div>
                    <div class="col align-self-center p-0">
                        <h6 class="p-1 m-0 txt-tab-title">E-mail</h6>
                    </div>
                    <div class="col align-self-center p-0">
                        <h6 class="p-1 m-0 txt-tab-title text-center">Ativo</h6>
                    </div>
                    <div class="col align-self-center p-0">
                        <h6 class="p-1 m-0 txt-tab-title text-end">Ações</h6>
                    </div>
                </div>
                <div class="row" key="id">
                    <div class="col" is="dmx-repeat" id="listaColaboradores" dmx-bind:repeat="listarColaboradores.data.queryListarColaboradores" key="id">
                        <div class="row gx-2 py-3 align-items-center border-bottom mx-0">
                            <div class="col align-self-center p-0">
                                <p class="p-1 m-0 txt-tab">{{nome}}</p>
                            </div>
                            <div class="col align-self-center p-0">
                                <p class="p-1 m-0 txt-tab">{{email}}</p>
                            </div>
                            <div class="col align-self-center p-0 text-center">
                                <input class="form-check-input" type="checkbox" value="" id="input2" name="input2" dmx-bind:checked="isAtivo==1" readonly="true" disabled="true">
                            </div>
                            <div class="col align-self-center p-0">
                                <div class="d-flex justify-content-end">
                                    <div class="dropdown">
                                        <button id="editar" class="btn dropdown-toggle btn-sm btn-light txt-tab-button" type="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Ações</button>
                                        <div class="dropdown-menu" aria-labelledby="dropdown1">
                                            <button id="btn2" class="btn w-100 text-start" dmx-on:click="editarColagorador.select(id);editarModal.show()" data-bs-target="#editarModal" type="submit">Editar</button>
                                        </div>
                                    </div>
                                </div>


                            </div>
                        </div>
                    </div>



                </div>


            </div>
        </div>
    </div>
</main>
