<!-- Wappler include head-page="dashboard.html" is="dmx-app" id="colaboradores" appConnect="local" bootstrap5="local" capacitor="local" components="{dmxBootstrap5Modal:{},dmxNotifications:{},dmxFormatter:{},dmxBootstrap5TableGenerator:{},dmxValidator:{}}" -->
<dmx-serverconnect id="listarColaboradores" url="https://sun.spacefeed.app/api/colaborador/listar-colaboradores" site="web" dmx-param:empresa="usuario.data.queryUsuario[0].empresa"></dmx-serverconnect>
<dmx-notifications id="toasts"></dmx-notifications>
<div class="modal" id="cadastrar" is="dmx-bs5-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Adicionar novo colaborador</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-5">
                <form method="post" action="https://sun.spacefeed.app/api/colaborador/cadastrar-colaborador" site="web" dmx-on:error="toasts.danger(lastError.status+lastError.message+lastError.response);cadcolaborador.reset()" dmx-on:success="toasts.success('Cadastrado com sucesso!');cadcolaborador.reset();cadastrar.hide();listarColaboradores.load({})" id="cadcolaborador" is="dmx-serverconnect-form">

                    <div class="form-group mb-3">
                        <input type="text" class="form-control ipt-text-02" id="nomecolaborador" name="nomecolaborador" aria-describedby="input2_help" placeholder="Nome completo do colaborador">
                    </div>
                    <div class="form-group mb-3">
                        <input type="email" class="form-control ipt-text-02" id="emailcolaborador" name="emailcolaborador" aria-describedby="input2_help" placeholder="Enter some text">
                    </div>
                    <div class="form-group mb-3">
                        <input type="hidden" class="form-control ipt-text-02" id="empresa" name="empresa" aria-describedby="input2_help" placeholder="Enter some text" dmx-bind:value="usuario.data.queryUsuario[0].empresa">
                    </div>
                    <div class="d-flex flex-row flex-wrap p-3 rounded-3 border-inner-form">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="academicocheck" name="academicocheck" value="1">
                            <label class="form-check-label" for="academicocheck">Acadêmico</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="admincheck" name="admincheck">
                            <label class="form-check-label" for="admincheck">Administrativo</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="atendimentocheck" name="atendimentocheck">
                            <label class="form-check-label" for="atendimentocheck">Atendimento</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="comercialcheck" name="comercialcheck">
                            <label class="form-check-label" for="comercialcheck">Comercial</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="diretoriacheck" name="diretoriacheck">
                            <label class="form-check-label" for="diretoriacheck">Diretoria</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="financeirocheck" name="financeirocheck">
                            <label class="form-check-label" for="financeirocheck">Financeiro</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="mktcheck" name="mktcheck">
                            <label class="form-check-label" for="mktcheck">Marketing</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" value="1" id="ticheck" name="ticheck">
                            <label class="form-check-label" for="ticheck">T.I</label>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary" dmx-on:click="cadcolaborador.submit()">Adicionar</button>
            </div>
        </div>
    </div>
</div>
<main>
    <div class="container-fluid bg-white p-4 rounded-3">
        <div class="row">
            <div class="col">
                <div class="d-flex flex-row align-items-center justify-content-between mb-5">
                    <form id="form1">
                        <div class="form-group">
                            <input type="text" class="form-control ipt-text-02" id="input1" name="input1" aria-describedby="input1_help" placeholder="Pesquisar por nome">
                        </div>
                    </form>
                    <button id="btn1" class="btn btn-primary btn-txt" data-bs-toggle="modal" data-bs-target="#cadastrar">Adicionar Colaborador</button>
                </div>
                <div class="row pb-3 align-items-center border-bottom">
                    <div class="col-3 align-self-center p-0 m-0">
                        <h6>Nome</h6>
                    </div>
                    <div class="col-3 align-self-center p-0 m-0">
                        <h6>E-mail</h6>
                    </div>
                    <div class="col-3 align-self-center p-0 m-0">
                        <h6>Ativo</h6>
                    </div>
                </div>
                <div class="row" key="id">
                    <div class="col" is="dmx-repeat" id="listaColaboradores" dmx-bind:repeat="listarColaboradores.data.queryListarColaboradores.data" key="id">
                        <div class="row py-3 align-items-center border-bottom">
                            <div class="col-3 align-self-center">
                                <p class="p-0 m-0">{{nome}}</p>
                            </div>
                            <div class="col-3 align-self-center">
                                <p class="p-0 m-0">{{email}}</p>
                            </div>
                            <div class="col-3 align-self-center">
                                <input class="form-check-input" type="checkbox" value="" id="input2" name="input2" dmx-bind:checked="isAtivo==1">
                            </div>
                        </div>
                    </div>



                </div>


            </div>
        </div>
    </div>
</main>
