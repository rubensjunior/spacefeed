<!-- Wappler include head-page="dashboard.html" is="dmx-app" id="colaboradores" appConnect="local" bootstrap5="local" capacitor="local" components="{dmxBootstrap5Modal:{},dmxNotifications:{},dmxFormatter:{},dmxBootstrap5TableGenerator:{},dmxValidator:{},dmxDataTraversal:{}}" -->
<dmx-data-detail id="editarColagorador" dmx-bind:data="listarColaboradores.data.queryListarColaboradores.data" key="id"></dmx-data-detail>
<dmx-serverconnect id="listarColaboradores" url="https://sun.spacefeed.app/api/colaborador/listar-colaboradores" site="web" dmx-param:empresa="usuario.data.queryUsuario[0].empresa"></dmx-serverconnect>
<dmx-notifications id="toasts"></dmx-notifications>
<div class="modal" id="cadastrar" is="dmx-bs5-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Adicionar novo colaborador - {{cadcolaborador.academicocheck1.value}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-5">
                <form method="post" action="https://sun.spacefeed.app/api/colaborador/cadastrar-colaborador" site="web" dmx-on:error="toasts.danger(lastError.status+lastError.message+lastError.response);cadcolaborador.reset()" dmx-on:success="toasts.success('Cadastrado com sucesso!');cadcolaborador.reset();cadastrar.hide();listarColaboradores.load({})" id="cadcolaborador" is="dmx-serverconnect-form">

                    <div class="form-group mb-3">
                        <input type="text" class="form-control ipt-text-02" id="nomecolaborador" name="nomecolaborador" aria-describedby="input2_help" placeholder="Nome completo do colaborador">
                    </div>
                    <div class="form-group mb-3">
                        <input type="email" class="form-control ipt-text-02" id="emailcolaborador" name="emailcolaborador" aria-describedby="input2_help" placeholder="Enter some text">
                    </div>
                    <div class="form-group mb-3">
                        <input type="hidden" class="form-control ipt-text-02" id="empresa" name="empresa" aria-describedby="input2_help" placeholder="Enter some text" dmx-bind:value="usuario.data.queryUsuario[0].empresa">
                    </div>
                    <div class="d-flex flex-row flex-wrap p-3 rounded-3 border-inner-form">

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="academicocheck" name="academicocheck" value="1">
                            <dmx-value id="academicocheck"></dmx-value><label class="form-check-label" for="academicocheck">Acadêmico</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="admincheck" name="admincheck" value="1">
                            <label class="form-check-label" for="admincheck">Administrativo</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="atendimentocheck" name="atendimentocheck" value="1">
                            <label class="form-check-label" for="atendimentocheck">Atendimento</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="comercialcheck" name="comercialcheck" value="1">
                            <label class="form-check-label" for="comercialcheck">Comercial</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="diretoriacheck" name="diretoriacheck" value="1">
                            <label class="form-check-label" for="diretoriacheck">Diretoria</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="financeirocheck" name="financeirocheck" value="1">
                            <label class="form-check-label" for="financeirocheck">Financeiro</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="mktcheck" name="mktcheck" value="1">
                            <label class="form-check-label" for="mktcheck">Marketing</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="ticheck" name="ticheck" value="1">
                            <label class="form-check-label" for="ticheck">T.I</label>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary" dmx-on:click="cadcolaborador.submit()">Adicionar</button>
            </div>
        </div>
    </div>
</div>
<div class="modal" id="editar" is="dmx-bs5-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar colaborador</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-5 py-4">
                <form method="post" action="https://sun.spacefeed.app/api/colaborador/atualizar-dados" site="web" is="dmx-serverconnect-form" id="editarestecolaborador" dmx-on:error="toasts.danger(lastError.status+lastError.message+lastError.response)" dmx-on:success="editarColagorador.select(editarColagorador.data.id);editar.hide();editarestecolaborador.reset();toasts.success('Atualizado com sucesso!');listarColaboradores.load({})">


                    <div class="form-group mb-3">
                        <input type="text" class="form-control ipt-text-02" id="editnomecolaborador" name="editnomecolaborador" aria-describedby="input2_help" placeholder="Nome completo do colaborador" dmx-bind:value="editarColagorador.data.nome">
                    </div>
                    <div class="form-group mb-3">
                        <input type="hidden" class="form-control" id="editacademicocheck" name="editacademicocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="academico.value">
                        <input type="hidden" class="form-control" id="editadministrativo" name="editadministrativo" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="adm.value">
                        <input type="hidden" class="form-control" id="editatendimentocheck" name="editatendimentocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="atendimento.value">
                        <input type="hidden" class="form-control" id="editcomercialcheck" name="editcomercialcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="comercial.value">
                        <input type="hidden" class="form-control" id="editdiretoriacheck" name="editdiretoriacheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="diretoria.value">
                        <input type="hidden" class="form-control" id="editfinanceirocheck" name="editfinanceirocheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="financeiro.value">
                        <input type="hidden" class="form-control" id="editmktcheck" name="editmktcheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="marketing.value">
                        <input type="hidden" class="form-control" id="editticheck" name="editticheck" aria-describedby="input1_help" placeholder="Enter some text" dmx-bind:value="ti.value">
                    </div>
                    <div class="form-group mb-3">
                        <input type="email" class="form-control ipt-text-02" id="editemailcolaborador" name="editemailcolaborador" aria-describedby="input2_help" placeholder="E-mail para login" dmx-bind:value="editarColagorador.data.email">
                        <input type="hidden" class="form-control ipt-text-02" id="id" name="id" aria-describedby="input2_help" placeholder="E-mail para login" dmx-bind:value="editarColagorador.data.id">
                    </div>
                    <div class="row p-2 m-0 rounded-3 border-inner-form">
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="academico" name="academico" dmx-on:checked="academico.setValue(1)" dmx-on:unchecked="academico.setValue(0)" dmx-bind:value="editarColagorador.data.academico" dmx-bind:checked="editarColagorador.data.academico==1">
                                <label class="form-check-label" for="academico">Acadêmico</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="adm" name="adm" dmx-on:checked="adm.setValue(1)" dmx-on:unchecked="adm.setValue(0)" dmx-bind:value="editarColagorador.data.administrativo" dmx-bind:checked="editarColagorador.data.administrativo==1">
                                <label class="form-check-label" for="adm">Administrativo</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="atendimento" name="atendimento" dmx-on:checked="atendimento.setValue(1)" dmx-on:unchecked="atendimento.setValue(0)" dmx-bind:value="editarColagorador.data.atendimento" dmx-bind:checked="editarColagorador.data.atendimento==1">
                                <label class="form-check-label" for="atendimento">Atendimento<br></label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="comercial" name="comercial" dmx-on:checked="comercial.setValue(1)" dmx-on:unchecked="comercial.setValue(0)" dmx-bind:value="editarColagorador.data.comercial" dmx-bind:checked="editarColagorador.data.comercial==1">
                                <label class="form-check-label" for="comercial">Comercial</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="diretoria" name="diretoria" dmx-on:checked="diretoria.setValue(1)" dmx-on:unchecked="diretoria.setValue(0)" dmx-bind:value="editarColagorador.data.diretoria" dmx-bind:checked="editarColagorador.data.diretoria==1">
                                <label class="form-check-label" for="diretoria">Diretoria</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="financeiro" name="financeiro" dmx-on:checked="financeiro.setValue(1)" dmx-on:unchecked="financeiro.setValue(0)" dmx-bind:value="editarColagorador.data.financeiro" dmx-bind:checked="editarColagorador.data.financeiro==1">
                                <label class="form-check-label" for="financeiro">Financeiro</label>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="marketing" name="marketing" dmx-on:checked="marketing.setValue(1)" dmx-on:unchecked="marketing.setValue(0)" dmx-bind:value="editarColagorador.data.marketing" dmx-bind:checked="editarColagorador.data.marketing==1">
                                <label class="form-check-label" for="marketing">Marketing</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ti" name="ti" dmx-on:checked="ti.setValue(1)" dmx-on:unchecked="ti.setValue(0)" dmx-bind:value="editarColagorador.data.ti" dmx-bind:checked="editarColagorador.data.ti==1">
                                <label class="form-check-label" for="ti">T.I</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary" dmx-on:click="editarestecolaborador.submit()">Adicionar</button>
            </div>
        </div>
    </div>
</div>
<main>
    <div class="container-fluid bg-white p-4 rounded-3">
        <div class="row">
            <div class="col">
                <div class="d-flex flex-row align-items-center mb-5 justify-content-between">
                    <h3 class="p-0 m-0">Gestão de colaboradores</h3>
                    <button id="btn1" class="btn btn-primary btn-txt" data-bs-toggle="modal" data-bs-target="#cadastrar">Adicionar Colaborador</button>
                </div>
                <div class="row pb-3 align-items-center border-bottom mx-0">
                    <div class="col-3 align-self-center p-0">
                        <h6>Nome</h6>
                    </div>
                    <div class="col-3 align-self-center p-0">
                        <h6>E-mail</h6>
                    </div>
                    <div class="col-3 align-self-center p-0">
                        <h6>Ativo</h6>
                    </div>
                    <div class="col-3 align-self-center p-0">
                        <h6>Ações</h6>
                    </div>
                </div>
                <div class="row" key="id">
                    <div class="col" is="dmx-repeat" id="listaColaboradores" dmx-bind:repeat="listarColaboradores.data.queryListarColaboradores.data" key="id">
                        <div class="row py-3 align-items-center border-bottom mx-0">
                            <div class="col-3 align-self-center p-0">
                                <p class="p-0 m-0">{{nome}}</p>
                            </div>
                            <div class="col-3 align-self-center p-0">
                                <p class="p-0 m-0">{{email}}</p>
                            </div>
                            <div class="col-3 align-self-center p-0">
                                <input class="form-check-input" type="checkbox" value="" id="input2" name="input2" dmx-bind:checked="isAtivo==1">
                            </div>
                            <div class="col-3 align-self-center p-0">

                                <div class="dropdown ">
                                    <button id="editar" class="btn dropdown-toggle btn-sm btn-light" type="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Ações</button>
                                    <div class="dropdown-menu" aria-labelledby="dropdown1">
                                        <button id="btn2" class="btn w-100 text-start" dmx-on:click="editarColagorador.select(id);editar.show()" data-bs-target="#editar" type="submit" data-bs-toggle="modal">Editar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>



                </div>


            </div>
        </div>
    </div>
</main>
