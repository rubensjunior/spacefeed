<div class="modal" id="popupcriarcolaborador" is="dmx-bs5-modal" tabindex="-1">

        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Criar colaborador</h5>

            </div>
            <div class="modal-body">
                <form id="cadastrocolaborador">


                    <div class="form-group mb-3">
                        <input type="text" class="form-control bg-input" id="nomecolaborador" name="nomecolaborador" aria-describedby="input2_help" placeholder="Nome completo">
                    </div>
                    <div class="form-group mb-3">
                        <input type="text" class="form-control bg-input" id="emailcolaborador" name="emailcolaborador" aria-describedby="input2_help" placeholder="E-mail para login">
                    </div>
                    <div class="d-flex flex-row justify-content-start align-items-center flex-wrap borda-interna p-3 rounded-3">
                        <div class="d-flex mb-2 flex-row flex-wrap justify-content-between w-100">
                            <div class="form-group ">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="input7" name="input7">
                                    <label class="form-check-label" for="input7">Administrativo</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="input2" name="input2">
                                    <label class="form-check-label" for="input2">Acadêmico</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="input3" name="input3">
                                    <label class="form-check-label" for="input3">Comercial</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex flex-row flex-wrap justify-content-between w-100">
                            <div class="form-group ">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="input4" name="input4">
                                    <label class="form-check-label" for="input4">Diretoria</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="input4" name="input4">
                                    <label class="form-check-label" for="input4">Financeiro</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="input4" name="input4">
                                    <label class="form-check-label" for="input4">Marketing</label>
                                </div>
                            </div>
                        </div>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-small" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-small btn-success">Salvar</button>
            </div>
        </div>
    </div>
</div>
<div class="container-fluid">
    <div class="row mb-3">
        <div class="col p-0 align-self-center">
            <h3 class="fw-bold">Colaboradores</h3>
        </div>
    </div>
    <div class="row border rounded-3 p-0 borda-container">
        <div class="col p-4">
            <div class="d-flex flex-row justify-content-between align-items-center">
                <form id="pesquisar">
                    <div class="form-group">
                        <input type="text" class="form-control bg-input" id="input1" name="input1" aria-describedby="input1_help" placeholder="Pesquisar por nome">

                </form><button id="btn1" class="btn btn-success btn-size" data-bs-toggle="modal" data-bs-target="#popupcriarcolaborador">Adicionar colaborador</button>
